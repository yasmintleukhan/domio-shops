services:
  web:
    build: .
    container_name: domio_shops_web
    expose:
      - "3031"
    environment:
      - NODE_ENV=production
      - PORT=3031
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/domio_shops
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://shop.domio.top}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-domino-storage}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.domio-shops.rule=Host(`shop.domio.top`)"
      - "traefik.http.routers.domio-shops.entrypoints=websecure"
      - "traefik.http.routers.domio-shops.tls=true"
      - "traefik.http.routers.domio-shops.tls.certresolver=myresolver"
      - "traefik.http.services.domio-shops.loadbalancer.server.port=3031"

  postgres:
    image: postgres:16-alpine
    container_name: domio_shops_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: domio_shops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres_data:

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge
