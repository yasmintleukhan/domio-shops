version: "3.8"

services:
  web:
    build: .
    ports:
      - "3031:3031"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/domio_shops
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-super-secret-domio-shops-key}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://shop.domio.top}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-domio-shops}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: domio_shops
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
